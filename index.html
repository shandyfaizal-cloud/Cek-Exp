<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Expired — Stok Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF7F2;
    --surface:#FFFFFF;
    --ink:#1C1814;
    --ink-soft:#6B6358;
    --border:#E8E1D6;
    --brand:#B45309;
    --brand-dark:#8A3F08;
    --brand-light:#FDE9CC;
    --red:#C0392B;
    --red-bg:#FBE3E0;
    --warn:#C97A1F;
    --warn-bg:#FBEAD2;
    --safe:#3F7D58;
    --safe-bg:#E3F0E8;
    --neutral-bg:#F0ECE4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:90px;
  }
  .brand-font{font-family:'Space Grotesk',sans-serif;}
  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:14px 16px 12px;
  }
  .topbar-row{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .brand{
    display:flex; align-items:center; gap:8px;
  }
  .brand-mark{
    width:30px; height:30px; border-radius:8px;
    background:var(--brand); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px;
    font-family:'Space Grotesk',sans-serif;
  }
  .brand-title{
    font-size:17px; font-weight:700;
    font-family:'Space Grotesk',sans-serif;
    letter-spacing:-0.01em;
  }
  .sync-area{
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--ink-soft);
  }
  .sync-dot{
    width:8px; height:8px; border-radius:50%;
    background:#9CA3AF;
    flex-shrink:0;
  }
  .sync-dot.connected{background:var(--safe);}
  .sync-dot.error{background:var(--red);}
  .sync-dot.loading{background:var(--warn); animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .refresh-btn{
    border:none; background:none; cursor:pointer;
    color:var(--brand); padding:4px; font-size:16px;
    display:flex; align-items:center;
  }
  .search-row{display:flex; gap:8px; margin-bottom:10px;}
  .search-input{
    flex:1; border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; font-size:14px; background:var(--bg);
    color:var(--ink);
  }
  .search-input:focus{outline:2px solid var(--brand-light); border-color:var(--brand);}
  .scan-btn{
    flex-shrink:0; width:42px; border:1px solid var(--border); border-radius:10px;
    background:var(--brand-light); font-size:17px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .scan-btn:active{transform:scale(0.94);}
  .filter-row{
    display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;
  }
  .filter-row select{
    border:1px solid var(--border); border-radius:8px;
    padding:7px 10px; font-size:13px; background:var(--surface);
    color:var(--ink-soft); flex-shrink:0; max-width:130px;
  }
  .count-label{
    font-size:12px; color:var(--ink-soft); margin-left:auto;
    align-self:center; flex-shrink:0; white-space:nowrap;
  }
  main{padding:14px 16px;}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:12px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-left:4px solid var(--neutral-bg);
    border-radius:12px;
    padding:13px 14px;
    cursor:pointer;
    transition:box-shadow 0.15s ease, transform 0.1s ease;
  }
  .card:hover{box-shadow:0 4px 14px rgba(28,24,20,0.08);}
  .card:active{transform:scale(0.99);}
  .card.status-expired{border-left-color:var(--red);}
  .card.status-urgent{border-left-color:var(--red);}
  .card.status-warning{border-left-color:var(--warn);}
  .card.status-safe{border-left-color:var(--safe);}
  .card-top{
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:8px; margin-bottom:6px;
  }
  .plu{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:13px; font-weight:600; color:var(--ink-soft);
    background:var(--neutral-bg); padding:2px 7px; border-radius:6px;
  }
  .tag{
    font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px;
    white-space:nowrap;
  }
  .tag-expired,.tag-urgent{background:var(--red-bg); color:var(--red);}
  .tag-warning{background:var(--warn-bg); color:var(--warn);}
  .tag-safe{background:var(--safe-bg); color:var(--safe);}
  .tag-neutral{background:var(--neutral-bg); color:var(--ink-soft);}
  .desc{
    font-size:14.5px; font-weight:600; margin:0 0 8px;
    line-height:1.3;
  }
  .meta-row{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;}
  .meta-chip{
    font-size:11.5px; color:var(--ink-soft);
    background:var(--bg); border:1px solid var(--border);
    padding:2px 8px; border-radius:6px;
  }
  .card-bottom{
    display:flex; align-items:center; justify-content:space-between;
    font-size:12.5px; color:var(--ink-soft);
    border-top:1px dashed var(--border); padding-top:8px;
  }
  .barcode-line{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:11px; color:var(--ink-soft); margin-bottom:6px;
  }
  .cek-line{
    font-size:11px; color:var(--ink-soft); margin-top:6px;
  }
  .empty{
    grid-column:1/-1; text-align:center; padding:60px 20px;
    color:var(--ink-soft); font-size:14px;
  }
  .setup-notice{
    grid-column:1/-1; background:var(--brand-light);
    border:1px solid var(--brand); border-radius:12px;
    padding:18px; font-size:13.5px; line-height:1.6;
  }
  .setup-notice b{color:var(--brand-dark);}
  .setup-notice code{
    background:rgba(0,0,0,0.06); padding:1px 5px; border-radius:4px;
    font-size:12.5px;
  }
  .fab{
    position:fixed; right:18px; bottom:22px; z-index:30;
    width:54px; height:54px; border-radius:50%;
    background:var(--brand); color:#fff; border:none;
    font-size:26px; cursor:pointer;
    box-shadow:0 6px 16px rgba(180,83,9,0.4);
    display:flex; align-items:center; justify-content:center;
    line-height:1;
  }
  .fab:active{transform:scale(0.94);}
  .modal-overlay{
    position:fixed; inset:0; background:rgba(28,24,20,0.5);
    z-index:40; display:flex; align-items:flex-end;
    justify-content:center;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:var(--surface); width:100%; max-width:460px;
    border-radius:18px 18px 0 0; padding:22px 18px 24px;
    max-height:88vh; overflow-y:auto;
    animation:slideUp 0.22s ease-out;
  }
  @media(min-width:560px){
    .modal-overlay{align-items:center;}
    .modal{border-radius:16px;}
  }
  @keyframes slideUp{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal h2{
    font-family:'Space Grotesk',sans-serif; font-size:18px; margin:0 0 16px;
  }
  .field{margin-bottom:13px;}
  .field label{
    display:block; font-size:12.5px; font-weight:600;
    color:var(--ink-soft); margin-bottom:5px;
  }
  .field input{
    width:100%; border:1px solid var(--border); border-radius:9px;
    padding:10px 11px; font-size:14.5px; color:var(--ink);
    background:var(--bg);
  }
  .field input:focus{outline:2px solid var(--brand-light); border-color:var(--brand);}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .btn{
    flex:1; border:none; border-radius:10px; padding:12px;
    font-size:14.5px; font-weight:600; cursor:pointer;
  }
  .btn-cancel{background:var(--neutral-bg); color:var(--ink-soft);}
  .btn-submit{background:var(--brand); color:#fff;}
  .btn-submit:disabled{opacity:0.6;}
  .toast{
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:10px;
    font-size:13.5px; z-index:50; max-width:88vw; text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .toast.error{background:var(--red);}
  .toast.success{background:var(--safe);}
  .toast.hidden{display:none;}
  .scanner-overlay{
    position:fixed; inset:0; background:#000; z-index:60;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .scanner-overlay.hidden{display:none;}
  .scanner-overlay video{
    width:100%; height:100%; object-fit:cover;
  }
  .scanner-frame{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:78%; max-width:320px; height:110px;
    border:3px solid var(--brand-light); border-radius:14px;
    box-shadow:0 0 0 2000px rgba(0,0,0,0.45);
    pointer-events:none;
  }
  .scanner-close{
    position:absolute; top:18px; right:18px; z-index:2;
    width:38px; height:38px; border-radius:50%;
    background:rgba(255,255,255,0.15); color:#fff; border:none;
    font-size:16px; cursor:pointer;
  }
  .scanner-hint{
    position:absolute; bottom:42px; left:0; right:0;
    text-align:center; color:#fff; font-size:13.5px; margin:0;
    text-shadow:0 1px 3px rgba(0,0,0,0.6);
  }
  .detail-block{
    background:var(--bg); border:1px solid var(--border);
    border-radius:10px; padding:4px 12px; margin-bottom:16px;
  }
  .detail-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding:8px 0; border-bottom:1px dashed var(--border);
    font-size:13px;
  }
  .detail-row:last-child{border-bottom:none;}
  .detail-label{color:var(--ink-soft); flex-shrink:0;}
  .detail-value{font-weight:600; text-align:right;}
  .detail-value.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-weight:500;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div class="brand">
      <div class="brand-mark">EX</div>
      <div class="brand-title">Cek Expired</div>
    </div>
    <div class="sync-area">
      <span id="syncDot" class="sync-dot"></span>
      <span id="syncLabel">Memuat…</span>
      <button id="refreshBtn" class="refresh-btn" title="Sync ulang">↻</button>
    </div>
  </div>
  <div class="search-row">
    <input id="searchInput" class="search-input" type="text" placeholder="Cari PLU, barcode, atau deskripsi…">
    <button id="scanBtn" class="scan-btn" type="button" title="Scan barcode">📷</button>
  </div>
  <div class="filter-row">
    <select id="filterDiv"><option value="">Semua DIV</option></select>
    <select id="filterCat"><option value="">Semua CAT</option></select>
    <select id="filterLokasi"><option value="">Semua Lokasi</option></select>
    <span id="countLabel" class="count-label"></span>
  </div>
</div>

<main>
  <div id="grid" class="grid"></div>
</main>

<button id="fab" class="fab" title="Tambah data">+</button>

<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <h2>Tambah Data</h2>
    <form id="addForm">
      <div class="field">
        <label for="fDiv">DIV</label>
        <input id="fDiv" type="text" list="dlDiv" autocomplete="off">
        <datalist id="dlDiv"></datalist>
      </div>
      <div class="field">
        <label for="fCat">CAT</label>
        <input id="fCat" type="text" list="dlCat" autocomplete="off">
        <datalist id="dlCat"></datalist>
      </div>
      <div class="field">
        <label for="fPlu">PLU *</label>
        <input id="fPlu" type="text" required autocomplete="off">
      </div>
      <div class="field">
        <label for="fBarcode">Barcode</label>
        <input id="fBarcode" type="text" autocomplete="off">
      </div>
      <div class="field">
        <label for="fDesc">Deskripsi</label>
        <input id="fDesc" type="text" autocomplete="off">
      </div>
      <div class="field">
        <label for="fExp">Exp Date *</label>
        <input id="fExp" type="date" required>
      </div>
      <div class="field">
        <label for="fLokasi">Lokasi</label>
        <input id="fLokasi" type="text" list="dlLokasi" autocomplete="off">
        <datalist id="dlLokasi"></datalist>
      </div>
      <div class="field">
        <label for="fCek">Tanggal Cek</label>
        <input id="fCek" type="date">
      </div>
      <div class="modal-actions">
        <button type="button" id="cancelBtn" class="btn btn-cancel">Batal</button>
        <button type="submit" id="submitBtn" class="btn btn-submit">Simpan</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<div id="scannerOverlay" class="scanner-overlay hidden">
  <video id="scannerVideo" autoplay playsinline muted></video>
  <div class="scanner-frame"></div>
  <button id="scannerClose" class="scanner-close" type="button">✕</button>
  <p class="scanner-hint">Arahkan kamera ke barcode</p>
</div>

<div id="editModalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <h2>Update Tanggal Exp</h2>
    <div class="detail-block">
      <div class="detail-row"><span class="detail-label">PLU</span><span id="dPlu" class="detail-value mono"></span></div>
      <div class="detail-row"><span class="detail-label">Barcode</span><span id="dBarcode" class="detail-value mono"></span></div>
      <div class="detail-row"><span class="detail-label">Deskripsi</span><span id="dDesc" class="detail-value"></span></div>
      <div class="detail-row"><span class="detail-label">DIV / CAT</span><span id="dDivCat" class="detail-value"></span></div>
      <div class="detail-row"><span class="detail-label">Lokasi</span><span id="dLokasi" class="detail-value"></span></div>
      <div class="detail-row"><span class="detail-label">Exp saat ini</span><span id="dExpCurrent" class="detail-value"></span></div>
    </div>
    <form id="editForm">
      <div class="field">
        <label for="eExp">Tanggal Exp Baru *</label>
        <input id="eExp" type="date" required>
      </div>
      <div class="modal-actions">
        <button type="button" id="editCancelBtn" class="btn btn-cancel">Batal</button>
        <button type="submit" id="editSubmitBtn" class="btn btn-submit">Simpan</button>
      </div>
    </form>
  </div>
</div>

<script>
  // =====================================================
  // GANTI URL DI BAWAH INI dengan Web App URL dari Apps Script
  // =====================================================
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbz7D3-zTf3m3TVxITcJu9FiOjkFHa1AOgo-QFn_MpYrTbOzYQyoFuKpK5SFtDX2VDXwdw/exec"
  };

  const state = { allData: [] };

  const els = {
    search: document.getElementById('searchInput'),
    filterDiv: document.getElementById('filterDiv'),
    filterCat: document.getElementById('filterCat'),
    filterLokasi: document.getElementById('filterLokasi'),
    countLabel: document.getElementById('countLabel'),
    grid: document.getElementById('grid'),
    syncDot: document.getElementById('syncDot'),
    syncLabel: document.getElementById('syncLabel'),
    refreshBtn: document.getElementById('refreshBtn'),
    fab: document.getElementById('fab'),
    modalOverlay: document.getElementById('modalOverlay'),
    addForm: document.getElementById('addForm'),
    cancelBtn: document.getElementById('cancelBtn'),
    submitBtn: document.getElementById('submitBtn'),
    toast: document.getElementById('toast'),
    fDiv: document.getElementById('fDiv'),
    fCat: document.getElementById('fCat'),
    fPlu: document.getElementById('fPlu'),
    fBarcode: document.getElementById('fBarcode'),
    fDesc: document.getElementById('fDesc'),
    fExp: document.getElementById('fExp'),
    fLokasi: document.getElementById('fLokasi'),
    fCek: document.getElementById('fCek'),
    dlDiv: document.getElementById('dlDiv'),
    dlCat: document.getElementById('dlCat'),
    dlLokasi: document.getElementById('dlLokasi'),
    scanBtn: document.getElementById('scanBtn'),
    scannerOverlay: document.getElementById('scannerOverlay'),
    scannerVideo: document.getElementById('scannerVideo'),
    scannerClose: document.getElementById('scannerClose'),
    editModalOverlay: document.getElementById('editModalOverlay'),
    editForm: document.getElementById('editForm'),
    eExp: document.getElementById('eExp'),
    editCancelBtn: document.getElementById('editCancelBtn'),
    editSubmitBtn: document.getElementById('editSubmitBtn'),
    dPlu: document.getElementById('dPlu'),
    dBarcode: document.getElementById('dBarcode'),
    dDesc: document.getElementById('dDesc'),
    dDivCat: document.getElementById('dDivCat'),
    dLokasi: document.getElementById('dLokasi'),
    dExpCurrent: document.getElementById('dExpCurrent')
  };

  function escapeHTML(str){
    return String(str == null ? '' : str).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function daysUntil(dateStr){
    if(!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const exp = new Date(dateStr); 
    if(isNaN(exp.getTime())) return null;
    exp.setHours(0,0,0,0);
    return Math.round((exp - today) / 86400000);
  }

  function formatDateID(dateStr){
    if(!dateStr) return '-';
    const d = new Date(dateStr);
    if(isNaN(d.getTime())) return dateStr;
    const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    return d.getDate() + ' ' + bulan[d.getMonth()] + ' ' + d.getFullYear();
  }

  function getStatus(days){
    if(days === null) return { cls:'neutral', label:'-' };
    if(days < 0) return { cls:'expired', label:'Expired ' + Math.abs(days) + ' hr lalu' };
    if(days === 0) return { cls:'expired', label:'Expired hari ini' };
    if(days <= 7) return { cls:'urgent', label: days + ' hari lagi' };
    if(days <= 30) return { cls:'warning', label: days + ' hari lagi' };
    return { cls:'safe', label: days + ' hari lagi' };
  }

  function setSyncStatus(s){
    els.syncDot.className = 'sync-dot ' + s;
    if(s === 'connected') els.syncLabel.textContent = 'Tersambung';
    else if(s === 'error') els.syncLabel.textContent = 'Gagal sync';
    else els.syncLabel.textContent = 'Memuat…';
  }

  function showToast(msg, type){
    els.toast.textContent = msg;
    els.toast.className = 'toast' + (type ? ' ' + type : '');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function(){ els.toast.classList.add('hidden'); }, 3000);
  }

  function uniqueSorted(arr){
    return Array.from(new Set(arr.filter(function(v){ return v !== undefined && v !== null && v !== ''; })))
      .sort(function(a,b){ return String(a).localeCompare(String(b)); });
  }

  function fillSelect(selectEl, values, keepValue){
    const current = keepValue !== undefined ? keepValue : selectEl.value;
    const placeholder = selectEl.options[0];
    selectEl.innerHTML = '';
    selectEl.appendChild(placeholder);
    values.forEach(function(v){
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      selectEl.appendChild(opt);
    });
    if(values.indexOf(current) !== -1) selectEl.value = current;
  }

  function fillDatalist(dlEl, values){
    dlEl.innerHTML = values.map(function(v){
      return '<option value="' + escapeHTML(v) + '">';
    }).join('');
  }

  function populateFilterOptions(){
    const divs = uniqueSorted(state.allData.map(function(d){ return d.DIV; }));
    const cats = uniqueSorted(state.allData.map(function(d){ return d.CAT; }));
    const lokasis = uniqueSorted(state.allData.map(function(d){ return d.LOKASI; }));
    fillSelect(els.filterDiv, divs);
    fillSelect(els.filterCat, cats);
    fillSelect(els.filterLokasi, lokasis);
    fillDatalist(els.dlDiv, divs);
    fillDatalist(els.dlCat, cats);
    fillDatalist(els.dlLokasi, lokasis);
  }

  function cardHTML(item){
    const days = daysUntil(item['EXP DATE']);
    const status = getStatus(days);
    const dateLabel = formatDateID(item['EXP DATE']);
    const cekLabel = item['CEK DATE'] ? formatDateID(item['CEK DATE']) : null;
    return '' +
      '<div class="card status-' + status.cls + '" data-rowindex="' + escapeHTML(item.rowIndex) + '">' +
        '<div class="card-top">' +
          '<span class="plu">' + escapeHTML(item.PLU || '-') + '</span>' +
          '<span class="tag tag-' + status.cls + '">' + escapeHTML(status.label) + '</span>' +
        '</div>' +
        (item.BARCODE ? '<div class="barcode-line">' + escapeHTML(item.BARCODE) + '</div>' : '') +
        '<p class="desc">' + escapeHTML(item.DESC || 'Tanpa deskripsi') + '</p>' +
        '<div class="meta-row">' +
          '<span class="meta-chip">' + escapeHTML(item.DIV || '-') + '</span>' +
          '<span class="meta-chip">' + escapeHTML(item.CAT || '-') + '</span>' +
        '</div>' +
        '<div class="card-bottom">' +
          '<span>📍 ' + escapeHTML(item.LOKASI || '-') + '</span>' +
          '<span>' + escapeHTML(dateLabel) + '</span>' +
        '</div>' +
        (cekLabel ? '<div class="cek-line">Dicek terakhir: ' + escapeHTML(cekLabel) + '</div>' : '') +
      '</div>';
  }

  function renderCards(list){
    state.lastFiltered = list;
    if(list.length === 0){
      els.grid.innerHTML = '<div class="empty">Tidak ada data yang cocok.<br>Coba ubah kata kunci atau filter.</div>';
      return;
    }
    els.grid.innerHTML = list.map(cardHTML).join('');
  }

  function applyFilters(){
    const q = els.search.value.trim().toLowerCase();
    const div = els.filterDiv.value;
    const cat = els.filterCat.value;
    const lok = els.filterLokasi.value;
    const filtered = state.allData.filter(function(item){
      if(div && item.DIV !== div) return false;
      if(cat && item.CAT !== cat) return false;
      if(lok && item.LOKASI !== lok) return false;
      if(q){
        const plu = String(item.PLU || '').toLowerCase();
        const barcode = String(item.BARCODE || '').toLowerCase();
        const desc = String(item.DESC || '').toLowerCase();
        if(plu.indexOf(q) === -1 && barcode.indexOf(q) === -1 && desc.indexOf(q) === -1) return false;
      }
      return true;
    });
    filtered.sort(function(a,b){
      const da = daysUntil(a['EXP DATE']);
      const db = daysUntil(b['EXP DATE']);
      return (da === null ? 999999 : da) - (db === null ? 999999 : db);
    });
    renderCards(filtered);
    els.countLabel.textContent = filtered.length + ' item';
    return filtered;
  }

  function showSetupNotice(){
    setSyncStatus('error');
    els.syncLabel.textContent = 'Belum disambungkan';
    els.grid.innerHTML = '<div class="setup-notice">' +
      '<b>Belum disambungkan ke Google Sheet.</b><br><br>' +
      '1. Buka Google Sheet → Extensions → Apps Script<br>' +
      '2. Paste kode Code.gs yang sudah disiapkan<br>' +
      '3. Deploy → New deployment → Web app (Execute as: Me, Access: Anyone)<br>' +
      '4. Copy Web app URL, lalu ganti nilai <code>CONFIG.SCRIPT_URL</code> di bagian atas file ini' +
    '</div>';
  }

  async function fetchData(){
    if(CONFIG.SCRIPT_URL.indexOf('PASTE_') === 0){
      showSetupNotice();
      return;
    }
    setSyncStatus('loading');
    try{
      const res = await fetch(CONFIG.SCRIPT_URL);
      const json = await res.json();
      if(!json.success) throw new Error(json.error || 'Gagal mengambil data');
      state.allData = json.data || [];
      populateFilterOptions();
      applyFilters();
      setSyncStatus('connected');
    }catch(err){
      setSyncStatus('error');
      showToast('Gagal sync: ' + err.message, 'error');
    }
  }

  function openModal(){
    if(!els.fCek.value){
      const today = new Date();
      const pad = function(n){ return String(n).padStart(2,'0'); };
      els.fCek.value = today.getFullYear() + '-' + pad(today.getMonth()+1) + '-' + pad(today.getDate());
    }
    els.modalOverlay.classList.remove('hidden');
  }
  function closeModal(){
    els.modalOverlay.classList.add('hidden');
    els.addForm.reset();
  }

  async function handleAddSubmit(e){
    e.preventDefault();
    if(CONFIG.SCRIPT_URL.indexOf('PASTE_') === 0){
      showToast('Sambungkan ke Google Sheet dulu', 'error');
      return;
    }
    const payload = {
      DIV: els.fDiv.value.trim(),
      CAT: els.fCat.value.trim(),
      PLU: els.fPlu.value.trim(),
      BARCODE: els.fBarcode.value.trim(),
      DESC: els.fDesc.value.trim(),
      'EXP DATE': els.fExp.value,
      LOKASI: els.fLokasi.value.trim(),
      'CEK DATE': els.fCek.value
    };
    if(!payload.PLU || !payload['EXP DATE']){
      showToast('PLU dan Exp Date wajib diisi', 'error');
      return;
    }
    els.submitBtn.disabled = true;
    els.submitBtn.textContent = 'Menyimpan…';
    try{
      const res = await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if(!json.success) throw new Error(json.error || 'Gagal menyimpan');
      showToast('Data tersimpan ke sheet', 'success');
      closeModal();
      await fetchData();
    }catch(err){
      showToast('Gagal simpan: ' + err.message, 'error');
    }finally{
      els.submitBtn.disabled = false;
      els.submitBtn.textContent = 'Simpan';
    }
  }

  function todayStr(){
    const today = new Date();
    const pad = function(n){ return String(n).padStart(2,'0'); };
    return today.getFullYear() + '-' + pad(today.getMonth()+1) + '-' + pad(today.getDate());
  }

  function openEditModal(item){
    state.editingItem = item;
    els.dPlu.textContent = item.PLU || '-';
    els.dBarcode.textContent = item.BARCODE || '-';
    els.dDesc.textContent = item.DESC || '-';
    els.dDivCat.textContent = (item.DIV || '-') + ' / ' + (item.CAT || '-');
    els.dLokasi.textContent = item.LOKASI || '-';
    els.dExpCurrent.textContent = item['EXP DATE'] ? formatDateID(item['EXP DATE']) : 'Belum diisi';
    els.eExp.value = item['EXP DATE'] || '';
    els.editModalOverlay.classList.remove('hidden');
  }

  function closeEditModal(){
    els.editModalOverlay.classList.add('hidden');
    state.editingItem = null;
  }

  async function handleEditSubmit(e){
    e.preventDefault();
    if(!state.editingItem){ closeEditModal(); return; }
    if(!els.eExp.value){
      showToast('Tanggal Exp wajib diisi', 'error');
      return;
    }
    els.editSubmitBtn.disabled = true;
    els.editSubmitBtn.textContent = 'Menyimpan…';
    try{
      const res = await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'update',
          rowIndex: state.editingItem.rowIndex,
          fields: {
            'EXP DATE': els.eExp.value,
            'CEK DATE': todayStr()
          }
        })
      });
      const json = await res.json();
      if(!json.success) throw new Error(json.error || 'Gagal menyimpan');
      showToast('Tanggal exp tersimpan', 'success');
      closeEditModal();
      await fetchData();
    }catch(err){
      showToast('Gagal simpan: ' + err.message, 'error');
    }finally{
      els.editSubmitBtn.disabled = false;
      els.editSubmitBtn.textContent = 'Simpan';
    }
  }

  let scannerStream = null;
  let scannerLoopId = null;

  async function openScanner(){
    if(!('BarcodeDetector' in window)){
      showToast('Scan barcode tidak didukung browser ini. Pakai Chrome terbaru di Android.', 'error');
      return;
    }
    try{
      scannerStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      els.scannerVideo.srcObject = scannerStream;
      els.scannerOverlay.classList.remove('hidden');
      await els.scannerVideo.play();
      const detector = new BarcodeDetector({
        formats: ['ean_13','ean_8','code_128','upc_a','upc_e','code_39']
      });
      scanLoop(detector);
    }catch(err){
      showToast('Tidak bisa akses kamera: ' + err.message, 'error');
    }
  }

  async function scanLoop(detector){
    if(!scannerStream) return;
    try{
      const barcodes = await detector.detect(els.scannerVideo);
      if(barcodes.length > 0){
        const code = barcodes[0].rawValue;
        closeScanner();
        handleScanResult(code);
        return;
      }
    }catch(err){ /* lewati error per-frame */ }
    scannerLoopId = requestAnimationFrame(function(){ scanLoop(detector); });
  }

  function closeScanner(){
    els.scannerOverlay.classList.add('hidden');
    if(scannerLoopId) cancelAnimationFrame(scannerLoopId);
    scannerLoopId = null;
    if(scannerStream){
      scannerStream.getTracks().forEach(function(t){ t.stop(); });
      scannerStream = null;
    }
  }

  function handleScanResult(code){
    els.search.value = code;
    els.filterDiv.value = '';
    els.filterCat.value = '';
    els.filterLokasi.value = '';
    const filtered = applyFilters();
    if(navigator.vibrate) navigator.vibrate(80);
    if(filtered.length === 1){
      openEditModal(filtered[0]);
    }else if(filtered.length === 0){
      showToast('Barcode "' + code + '" tidak ditemukan di data', 'error');
    }
  }

  els.search.addEventListener('input', applyFilters);
  els.filterDiv.addEventListener('change', applyFilters);
  els.filterCat.addEventListener('change', applyFilters);
  els.filterLokasi.addEventListener('change', applyFilters);
  els.refreshBtn.addEventListener('click', fetchData);
  els.fab.addEventListener('click', openModal);
  els.cancelBtn.addEventListener('click', closeModal);
  els.modalOverlay.addEventListener('click', function(e){
    if(e.target === els.modalOverlay) closeModal();
  });
  els.addForm.addEventListener('submit', handleAddSubmit);

  els.scanBtn.addEventListener('click', openScanner);
  els.scannerClose.addEventListener('click', closeScanner);

  els.grid.addEventListener('click', function(e){
    const card = e.target.closest('.card');
    if(!card) return;
    const rowIndex = card.getAttribute('data-rowindex');
    const item = (state.lastFiltered || []).find(function(it){
      return String(it.rowIndex) === rowIndex;
    });
    if(item) openEditModal(item);
  });
  els.editCancelBtn.addEventListener('click', closeEditModal);
  els.editModalOverlay.addEventListener('click', function(e){
    if(e.target === els.editModalOverlay) closeEditModal();
  });
  els.editForm.addEventListener('submit', handleEditSubmit);

  fetchData();
</script>
</body>
</html>
